services:
  backend:
    build: ./backend
    container_name: heritage-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - audio_data:/app/static/audio
      - chroma_data:/app/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - heritage-net

  frontend:
    build: ./frontend
    container_name: heritage-frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - heritage-net

volumes:
  audio_data:
  chroma_data:

networks:
  heritage-net:
    driver: bridge
